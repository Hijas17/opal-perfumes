services:
  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: opal_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: opal_perfumes

  # ── PHP API (Slim 4 + Apache) ──────────────────────────────────────────────
  api:
    build:
      context: ./opal-api
      dockerfile: Dockerfile
    container_name: opal_api
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      # Live-mount source — entrypoint installs vendor/ on first start
      - ./opal-api:/var/www/html
    environment:
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: opal_perfumes
      JWT_SECRET: opal_dev_jwt_secret_change_in_production
      JWT_EXPIRY: 86400
      UPLOAD_DIR: uploads
      MAX_FILE_SIZE: 52428800
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:5174
      MAIL_FROM: noreply@opalperfumes.com
      ADMIN_NOTIFICATION_EMAIL: admin@opalperfumes.com
    depends_on:
      - mongodb

volumes:
  mongo_data:
