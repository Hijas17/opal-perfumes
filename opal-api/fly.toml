# Fly.io configuration for opal-api
#
# Deploy:
#   cd opal-api
#   fly launch --no-deploy --copy-config           # one-time: creates app, picks region
#   fly volumes create opal_uploads --size 3       # one-time: 3 GB persistent volume for uploads
#   fly secrets set MONGO_URI="..." JWT_SECRET="..." ALLOWED_ORIGINS="https://..." ...
#   fly deploy

app           = "opal-api"
primary_region = "fra"        # Frankfurt — change to "bom" (Mumbai) for closer UAE latency

[build]
  dockerfile = "Dockerfile"

[env]
  # Non-secret defaults. Secrets (MONGO_URI, JWT_SECRET) set via `fly secrets set`.
  MONGO_DB                  = "opal_perfumes"
  JWT_EXPIRY                = "86400"
  UPLOAD_DIR                = "uploads"
  MAX_FILE_SIZE             = "52428800"
  MAIL_FROM                 = "noreply@opalperfumes.com"
  ADMIN_NOTIFICATION_EMAIL  = "admin@opalperfumes.com"

# ── Persistent storage for admin-uploaded images ──────────────────────────────
# Survives deploys and restarts. Without this, every image disappears on redeploy.
[mounts]
  source      = "opal_uploads"
  destination = "/var/www/html/uploads"

# ── HTTP service ──────────────────────────────────────────────────────────────
[http_service]
  internal_port       = 80
  force_https         = true
  auto_stop_machines  = false   # always-on — no cold starts
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 200
    hard_limit = 250

# ── VM sizing (free tier: shared-cpu-1x with 256 MB RAM) ──────────────────────
[[vm]]
  size      = "shared-cpu-1x"
  memory    = "256mb"
  cpu_kind  = "shared"
  cpus      = 1
