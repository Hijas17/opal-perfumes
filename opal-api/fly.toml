# fly.toml app configuration file generated for opal-api on 2026-05-15T09:49:41+04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'opal-api'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  ADMIN_NOTIFICATION_EMAIL = 'admin@opalperfumes.com'
  JWT_EXPIRY = '86400'
  MAIL_FROM = 'noreply@opalperfumes.com'
  MAX_FILE_SIZE = '52428800'
  MONGO_DB = 'opal_perfumes'
  UPLOAD_DIR = 'uploads'

[[mounts]]
  source = 'opal_uploads'
  destination = '/var/www/html/uploads'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
